[package]
name = "chime"
description = "WIP library for continuous, predictable, mutable change over time"
repository = "https://github.com/Yokinman/chime"
authors = ["Yokin"]
version = "0.4.0"
edition = "2021"
license = "MIT OR Apache-2.0"
readme = "README.md"
keywords = []
categories = ["mathematics", "game-development", "simulation"]

[dependencies]
chime-flux-proc-macro = "0.2.0"
glam = { version = "0.25.0", optional = true }
bevy_ecs = { version = "0.13.0", optional = true }

[features]
glam = ["dep:glam"]
bevy = ["dep:bevy_ecs", "glam"]
